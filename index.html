<script>

const menu=[

["Chicken Momo",220],
["Veg Momo",150],
["Chicken Thali",380],
["Mutton Thali",490],
["Chicken Burger",290],
["Lassi",150]

];


let cart=[];


function showMenu(){

let html="";


menu.forEach((x,i)=>{

html+=`

<div class="item">

<b>${x[0]}</b><br>

Rs ${x[1]}<br>

<button onclick="add(${i})">ADD</button>

</div>

`;

});


document.getElementById("menu").innerHTML=html;

}



function add(i){

cart.push(menu[i]);

update();

}



function update(){

let html="";

let total=0;


cart.forEach(x=>{

html+=x[0]+" Rs "+x[1]+"<br>";

total+=x[1];

});


document.getElementById("cart").innerHTML=html;

document.getElementById("total").innerHTML=total;

}

</script>
