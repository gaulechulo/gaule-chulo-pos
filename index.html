<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Gaule Chulo POS</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="box">

<h1>GAULE CHULO POS</h1>

<div>

<button onclick="openPage('index.html')">
🛒 Cashier
</button>

<button onclick="openPage('kitchen.html')">
👨‍🍳 Kitchen
</button>

<button onclick="openPage('stock.html')">
📦 Stock
</button>

<button onclick="openPage('dashboard.html')">
📊 Dashboard
</button>

</div>

</div>



<div class="box">

<h3>Menu</h3>

<button onclick="cat('All')">All</button>
<button onclick="cat('Momo')">Momo</button>
<button onclick="cat('Main')">Main</button>
<button onclick="cat('Drink')">Drink</button>


<div id="menu" class="menu"></div>


</div>




<div class="box">

<h3>Order</h3>

<div id="cart"></div>


<p>Subtotal Rs <span id="sub">0</span></p>

<p>VAT 13% Rs <span id="vat">0</span></p>


<h2>Total Rs <span id="total">0</span></h2>


<button onclick="payment='Cash'">
Cash
</button>


<button onclick="payment='FonePay'">
FonePay
</button>


<button onclick="completeSale()">
Complete Sale
</button>


</div>


</div>



<script src="database.js"></script>


<script>


function openPage(page){

window.location.href=page;

}


const menu=[

["Chicken Jhol Momo",220,"Momo"],
["Veg Momo",150,"Momo"],
["Buff Fried Momo",200,"Momo"],

["Chicken Thali",380,"Main"],
["Mutton Thali",490,"Main"],
["Chicken Burger",290,"Main"],

["Mango Lassi",150,"Drink"],
["Mint Lemonade",120,"Drink"]

];


let cart=[];
let payment="";



function cat(c){

let html="";


menu.forEach((x,i)=>{


if(c=="All"||x[2]==c){


html+=`

<div class="item">

<b>${x[0]}</b><br>

Rs ${x[1]}

<br>

<button onclick="add(${i})">
ADD
</button>

</div>

`;

}

});


document.getElementById("menu").innerHTML=html;


}



function add(i){

cart.push(menu[i]);

update();

}



function update(){

let html="";
let sub=0;


cart.forEach((x,i)=>{


sub+=x[1];


html+=`

<div class="cart">

${x[0]} Rs ${x[1]}

</div>

`;


});


let vat=sub*0.13;


document.getElementById("cart").innerHTML=html;

document.getElementById("sub").innerHTML=sub;

document.getElementById("vat").innerHTML=Math.round(vat);

document.getElementById("total").innerHTML=Math.round(sub+vat);


}



function completeSale(){


let order={

date:new Date().toLocaleString(),

items:cart,

total:document.getElementById("total").innerHTML,

payment:payment,

status:"NEW"

};


saveOrder(order);


alert("Order Sent To Kitchen ✅");


cart=[];

update();


}



if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"service-worker.js"
);

}


cat("All");


</script>


</body>
</html>
